<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wix-html-scroll" content="no-scroll">
  <title>Music News — Amsterdam · May 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #f0a03a;
      --accent-blue: #4da6ff;
      --accent-orange: #ff8c1a;
      --black: #0a0a0a;
      --panel: rgba(8, 8, 8, 0.82);
      --border: #2a2a2a;
      --text: #f0ede8;
      --text-dim: #9a9088;
      --font: 'Space Grotesk', sans-serif;
      --font-display: 'Playfair Display', serif;
      --font-clean: 'IBM Plex Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --hub-max: min(1200px, calc(100vw - 40px));
      --hub-backdrop-image: url("https://static.wixstatic.com/media/c123de_538ebcd0cb8744009c22d5676cb8a5da~mv2.jpg");
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: auto; overflow-x: hidden; }
    body {
      background: #020408;
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 40px 0 64px;
      position: relative;
    }
    .hub-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(180deg, rgba(2, 5, 12, 0.48) 0%, rgba(0, 2, 6, 0.62) 100%),
        var(--hub-backdrop-image);
      background-size: cover;
      background-position: center;
      filter: brightness(0.84) saturate(1.08) contrast(1.03);
    }
    .wrap { max-width: var(--hub-max); margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
    .nav-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin-bottom: 28px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .nav-row a { color: #7ec8ff; text-decoration: none; }
    .nav-row a:hover { text-decoration: underline; }
    .header { text-align: center; margin-bottom: 28px; }
    .header-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #8a949e;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .header-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
    }
    .header-title span { color: var(--accent); }
    .header-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: #a8b6c4;
      margin-top: 12px;
      letter-spacing: 0.06em;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
    }
    .meta-bar {
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: #666;
      margin-bottom: 24px;
    }
    .meta-bar strong { color: #aaa; }
    .roundup-block {
      background: rgba(4, 8, 14, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 22px 18px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    }
    .roundup-kicker {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .roundup-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3.2vw, 30px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .roundup-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 14px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .roundup-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
    }
    .roundup-legend i {
      font-style: normal;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .roundup-legend .lg-date i {
      color: #9fd4ff;
      background: rgba(77, 166, 255, 0.14);
      border: 1px solid rgba(77, 166, 255, 0.32);
    }
    .roundup-legend .lg-venue i {
      color: #ffcc80;
      background: rgba(240, 160, 58, 0.14);
      border: 1px solid rgba(240, 160, 58, 0.32);
    }
    .roundup-hl-date {
      color: #9fd4ff;
      font-weight: 600;
    }
    .roundup-hl-venue {
      color: #ffcc80;
      font-weight: 600;
    }
    .roundup-lead p {
      font-family: var(--font-clean);
      font-size: 14px;
      line-height: 1.65;
      color: #c8d0d8;
      margin-bottom: 12px;
    }
    .roundup-lead p:last-child { margin-bottom: 0; }
    .roundup-lead-short {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #222;
      font-family: var(--font-clean);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-dim);
      font-style: italic;
    }
    .roundup-sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 22px;
    }
    .roundup-section {
      --section-border: rgba(255, 255, 255, 0.12);
      --section-head-border: rgba(255, 255, 255, 0.08);
      --section-glow: transparent;
      background: rgba(10, 10, 10, 0.65);
      border: 1.5px solid var(--section-border);
      border-radius: 10px;
      padding: 14px 14px 12px;
      box-shadow: 0 0 14px var(--section-glow);
    }
    .roundup-section--paradiso {
      --section-border: rgba(255, 107, 157, 0.72);
      --section-head-border: rgba(255, 107, 157, 0.38);
      --section-glow: rgba(255, 107, 157, 0.14);
    }
    .roundup-section--melkweg {
      --section-border: rgba(255, 140, 26, 0.75);
      --section-head-border: rgba(255, 140, 26, 0.4);
      --section-glow: rgba(255, 140, 26, 0.12);
    }
    .roundup-section--jazz {
      --section-border: rgba(196, 94, 10, 0.72);
      --section-head-border: rgba(196, 94, 10, 0.38);
      --section-glow: rgba(196, 94, 10, 0.12);
    }
    .roundup-section--openmic {
      --section-border: rgba(42, 157, 143, 0.72);
      --section-head-border: rgba(42, 157, 143, 0.38);
      --section-glow: rgba(42, 157, 143, 0.12);
    }
    .roundup-section--underground {
      --section-border: rgba(155, 125, 255, 0.72);
      --section-head-border: rgba(155, 125, 255, 0.38);
      --section-glow: rgba(155, 125, 255, 0.12);
    }
    .roundup-section--electronic {
      --section-border: rgba(34, 212, 255, 0.72);
      --section-head-border: rgba(34, 212, 255, 0.38);
      --section-glow: rgba(34, 212, 255, 0.12);
    }
    .roundup-section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--section-head-border);
    }
    .roundup-section-icon { font-size: 1rem; }
    .roundup-section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .roundup-picks {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .roundup-pick {
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      min-width: 0;
    }
    .roundup-pick:hover { border-color: rgba(77, 166, 255, 0.25); background: rgba(77, 166, 255, 0.04); }
    .roundup-pick-top {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .roundup-pick-date {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9fd4ff;
      background: rgba(77, 166, 255, 0.14);
      border: 1px solid rgba(77, 166, 255, 0.35);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .roundup-pick-headline {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      line-height: 1.3;
      flex: 1;
      min-width: 120px;
    }
    a.roundup-pick-headline:hover { color: var(--accent-blue); }
    .roundup-pick-venue {
      font-family: var(--mono);
      font-size: 9px;
      color: #ffcc80;
      background: rgba(240, 160, 58, 0.12);
      border: 1px solid rgba(240, 160, 58, 0.34);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: auto;
      flex-shrink: 0;
    }
    .roundup-pick-detail {
      font-family: var(--font-clean);
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-dim);
    }
    .roundup-pick-actions { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .roundup-pick-link {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      color: #7ec8ff;
      padding: 2px 0;
    }
    .roundup-pick-link:hover { text-decoration: underline; color: #fff; }
    .roundup-pick-link.map { color: var(--accent); }
    .hero-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .hero-photo {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 16 / 10;
      background: #111;
    }
    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: crisp-edges;
    }
    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.9);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .tab-btn:hover { border-color: var(--accent-hot, rgba(240, 160, 58, 0.4)); color: var(--text); }
    .tab-btn.active {
      border-color: rgba(77, 166, 255, 0.45);
      color: var(--accent-blue);
      background: rgba(77, 166, 255, 0.1);
    }
    .tab-btn.active.genre-jazz { border-color: rgba(201, 169, 97, 0.5); color: #e8c878; background: rgba(201, 169, 97, 0.1); }
    .tab-btn.active.genre-electronic { border-color: rgba(168, 85, 247, 0.45); color: #c4a0ff; background: rgba(168, 85, 247, 0.1); }
    .tab-btn.active.genre-indie { border-color: rgba(255, 140, 26, 0.45); color: var(--accent-orange); background: rgba(255, 140, 26, 0.1); }
    .tab-btn.active.genre-openmic { border-color: rgba(52, 211, 153, 0.45); color: #6ee7b7; background: rgba(52, 211, 153, 0.1); }
    .tab-btn.active.genre-underground { border-color: rgba(248, 113, 113, 0.4); color: #fca5a5; background: rgba(248, 113, 113, 0.08); }
    .tab-btn.active.genre-sources { border-color: rgba(240, 160, 58, 0.45); color: var(--accent); background: rgba(240, 160, 58, 0.1); }
    .tab-desc {
      font-family: var(--mono);
      font-size: 11px;
      color: #666;
      margin-bottom: 18px;
      letter-spacing: 0.04em;
    }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .news-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }
    .news-card:hover {
      transform: translateY(-2px);
      border-color: rgba(77, 166, 255, 0.35);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .news-card-media {
      height: 140px;
      background: linear-gradient(135deg, #1a1a2e, #0f172a);
      overflow: hidden;
      position: relative;
    }
    .news-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .news-card-media.placeholder::after {
      content: '♪';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.12);
    }
    .news-card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; }
    .news-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #666;
    }
    .news-card-date {
      color: #9fd4ff;
      background: rgba(77, 166, 255, 0.12);
      border: 1px solid rgba(77, 166, 255, 0.3);
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .news-card-source {
      color: #ffcc80;
      background: rgba(240, 160, 58, 0.1);
      border: 1px solid rgba(240, 160, 58, 0.3);
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .news-card-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 8px;
      color: #fff;
    }
    .news-card-title a { color: inherit; text-decoration: none; }
    .news-card-title a:hover { color: var(--accent-blue); }
    .news-card-snippet {
      font-family: var(--font-clean);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-dim);
      flex: 1;
      margin-bottom: 12px;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #333;
      color: #888;
    }
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
    .card-link {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid rgba(77, 166, 255, 0.35);
      background: rgba(77, 166, 255, 0.08);
      color: #9fd4ff;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .card-link:hover { border-color: var(--accent-blue); color: #fff; }
    .card-link.map-link {
      border-color: rgba(240, 160, 58, 0.4);
      background: rgba(240, 160, 58, 0.1);
      color: var(--accent);
    }
    .source-list { display: flex; flex-direction: column; gap: 10px; }
    .source-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 14px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .source-row a {
      color: var(--accent-blue);
      font-weight: 600;
      text-decoration: none;
      font-size: 15px;
    }
    .source-row a:hover { text-decoration: underline; }
    .source-note { font-size: 13px; color: var(--text-dim); font-family: var(--font-clean); flex: 1; min-width: 200px; }
    .source-num {
      font-family: var(--mono);
      font-size: 11px;
      color: #555;
      width: 28px;
      flex-shrink: 0;
    }
    .err-banner {
      background: rgba(120, 30, 30, 0.35);
      border: 1px solid rgba(255, 100, 100, 0.35);
      color: #faa;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-family: var(--mono);
      font-size: 12px;
    }
    .footer-note {
      margin-top: 36px;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: #555;
      letter-spacing: 0.06em;
    }
    html.embed-hub body { padding: 12px 0 24px; min-height: 100%; background: transparent; }
    html.embed-hub .hub-backdrop { display: none; }
    html.embed-hub .nav-row { display: none; }
    html.embed-hub .header { margin-bottom: 12px; text-align: left; }
    html.embed-hub .header-title { font-size: clamp(22px, 3.5vw, 30px); }
    html.embed-hub .header-sub { text-align: left; margin-left: 0; }
    html.embed-hub .hero-strip { grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    html.embed-hub .hero-photo { aspect-ratio: 16 / 9; }
    html.embed-hub .roundup-block { padding: 14px 14px 12px; margin-bottom: 16px; }
    html.embed-hub .roundup-title { font-size: 20px; }
    html.embed-hub .roundup-lead p { font-size: 13px; }
    html.embed-hub .roundup-sections { grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    html.embed-hub .news-card-media { height: 110px; }
    /* Tablet + desktop: two pick columns inside each venue block */
    @media (min-width: 700px) {
      .roundup-picks {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
      }
      .roundup-pick-top {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 8px;
        align-items: start;
      }
      .roundup-pick-date { grid-column: 1; grid-row: 1; }
      .roundup-pick-headline {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
      }
      .roundup-pick-venue {
        grid-column: 1 / -1;
        grid-row: 2;
        margin-left: 0;
        justify-self: start;
      }
    }
    @media (max-width: 699px) {
      .hero-strip { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="hub-backdrop" aria-hidden="true"></div>
  <div class="wrap">
    <nav class="nav-row" aria-label="Related pages">
      <a href="./live-music-hub.html">← Live Music Hub</a>
      <a href="./live-events-ticker.html">Events ticker</a>
      <a href="./live-music-finder.html">Jam map</a>
    </nav>

    <header class="header">
      <div class="header-eyebrow" id="headerEyebrow">Amsterdam · Music News Finder</div>
      <h1 class="header-title">Music <span>News</span></h1>
      <p class="header-sub" id="headerSub">Small snippets with links — general scene updates, genre tabs, and underground discovery.</p>
    </header>
    <p class="meta-bar" id="metaBar">Loading…</p>
    <div class="err-banner" id="errBanner" role="alert"></div>

    <section class="roundup-block" id="roundupBlock" hidden aria-labelledby="roundupTitle">
      <div class="roundup-kicker">Month highlight</div>
      <h2 class="roundup-title" id="roundupTitle"></h2>
      <div class="roundup-legend" id="roundupLegend" hidden>
        <span class="lg-date"><i>12 May</i> Dates</span>
        <span class="lg-venue"><i>Paradiso</i> Venues &amp; sources</span>
      </div>
      <div class="roundup-lead" id="roundupLead"></div>
      <div class="roundup-sections" id="roundupSections"></div>
    </section>

    <div class="hero-strip" id="heroStrip" aria-hidden="true">
      <div class="hero-photo"><img src="https://static.wixstatic.com/media/c123de_dbd9ce74d28640a589a494f6524ca25d~mv2.jpg" alt="Bimhuis jazz venue"></div>
      <div class="hero-photo"><img src="https://static.wixstatic.com/media/c123de_e73c91fc02824ef3a239674be8999dc8~mv2.jpg" alt="Paradiso concert hall"></div>
      <div class="hero-photo"><img src="https://static.wixstatic.com/media/c123de_86aa1dad6aa744b0bc7e790f55dc3a4c~mv2.jpg" alt="Melkweg live music"></div>
    </div>

    <div class="tab-row" id="tabRow" role="tablist" aria-label="News categories"></div>
    <p class="tab-desc" id="tabDesc"></p>
    <div class="news-grid" id="newsGrid"></div>

    <p class="footer-note" id="footerNote">Edit data/music-news-feed.json · preview via npm start</p>
  </div>

  <script>
    const FEED_URLS = [
      '/data/music-news-feed.json',
      '../data/music-news-feed.json',
      'https://energy-calc-backend.onrender.com/data/music-news-feed.json'
    ];
    const TAB_GENRE_CLASS = {
      jazz: 'genre-jazz',
      electronic: 'genre-electronic',
      indie: 'genre-indie',
      openmic: 'genre-openmic',
      underground: 'genre-underground',
      sources: 'genre-sources'
    };

    let FEED = { meta: {}, tabs: [], items: [], sources: [] };
    let activeTab = 'general';

    (function initEmbed() {
      const p = new URLSearchParams(window.location.search);
      if (p.get('embed') === 'hub') document.documentElement.classList.add('embed-hub');
    })();

    function isEmbedHub() {
      return document.documentElement.classList.contains('embed-hub');
    }

    function escapeHtml(s) {
      const t = document.createElement('div');
      t.textContent = s == null ? '' : String(s);
      return t.innerHTML;
    }

    function notifyHubMapVenue(venueId, venueName) {
      if (!isEmbedHub() || !venueId) return;
      try {
        window.parent.postMessage({ type: 'live-music-select-venue', venueId: Number(venueId), venueName: venueName || '' }, '*');
      } catch (_) { /* ignore */ }
    }

    async function loadFeed() {
      let lastErr = null;
      for (const u of FEED_URLS) {
        try {
          const r = await fetch(u, { cache: 'no-store' });
          if (!r.ok) throw new Error(r.status + ' ' + u);
          FEED = await r.json();
          return;
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error('Could not load music news feed');
    }

    function renderMeta() {
      const m = FEED.meta || {};
      document.getElementById('headerEyebrow').textContent =
        (m.city || 'Amsterdam') + ' · Music News Finder';
      document.getElementById('metaBar').innerHTML =
        '<strong>' + escapeHtml(m.edition || 'Edition') + '</strong>' +
        (m.publishedAt ? ' · published ' + escapeHtml(m.publishedAt) : '') +
        (m.tagline ? ' · ' + escapeHtml(m.tagline) : '');
      renderRoundup(m);
    }

    function buildRoundupHighlightTerms(roundup) {
      const venues = new Set([
        'Paradiso', 'Melkweg', 'BIMHUIS', 'Bimhuis', 'Amsterdam Alternative', 'Radar Squat',
        'Subbacultcha', 'OCCII', 'OT301', 'Zaal 100', 'ADE', 'I amsterdam', 'Leidseplein',
        'Tolhuistuin', 'Bitterzoet', 'OCCII', 'Muziekgebouw', 'Bandsintown', 'Eventbrite'
      ]);
      const dates = new Set(['May', 'May 2026', 'Tuesday', 'Tuesdays', '31st', '21–25 October 2026']);
      (roundup?.sections || []).forEach((sec) => {
        (sec.picks || []).forEach((pick) => {
          if (pick.venue) venues.add(pick.venue);
          if (pick.date) dates.add(pick.date);
        });
      });
      return {
        venues: [...venues].sort((a, b) => b.length - a.length),
        dates: [...dates].sort((a, b) => b.length - a.length)
      };
    }

    function colorizeRoundupText(text, terms) {
      let html = escapeHtml(text);
      terms.dates.forEach((d) => {
        const esc = escapeHtml(d);
        if (!esc) return;
        html = html.split(esc).join('<span class="roundup-hl-date">' + esc + '</span>');
      });
      terms.venues.forEach((v) => {
        const esc = escapeHtml(v);
        if (!esc) return;
        html = html.split(esc).join('<span class="roundup-hl-venue">' + esc + '</span>');
      });
      html = html.replace(
        /\b(\d{1,2}(?:[–-]\d{1,2})?\s+(?:January|February|March|April|May|June|July|August|September|October|November|December)(?:\s+\d{4})?)\b/gi,
        '<span class="roundup-hl-date">$1</span>'
      );
      html = html.replace(
        /\b(January|February|March|April|May|June|July|August|September|October|November|December)\b/g,
        '<span class="roundup-hl-date">$1</span>'
      );
      html = html.replace(/\b(\d{1,2}(?:st|nd|rd|th))\b/g, '<span class="roundup-hl-date">$1</span>');
      html = html.replace(/\b(Tuesdays?|Mondays?|Wednesdays?|weekends?)\b/gi, '<span class="roundup-hl-date">$1</span>');
      return html;
    }

    function renderRoundup(meta) {
      const block = document.getElementById('roundupBlock');
      const r = meta.roundup;
      if (!r && !meta.summary) {
        block.hidden = true;
        return;
      }
      block.hidden = false;
      document.getElementById('roundupTitle').textContent =
        r?.title || (meta.edition || 'This month') + ' — round-up';

      const legendEl = document.getElementById('roundupLegend');
      if (legendEl) legendEl.hidden = false;

      const highlightTerms = buildRoundupHighlightTerms(r);
      const leadEl = document.getElementById('roundupLead');
      const paragraphs = r?.paragraphs?.length ? r.paragraphs : (meta.summary ? [meta.summary] : []);
      let leadHtml = paragraphs.map((p) => '<p>' + colorizeRoundupText(p, highlightTerms) + '</p>').join('');
      if (r?.paragraphs?.length && meta.summary) {
        leadHtml += '<p class="roundup-lead-short">' + colorizeRoundupText(meta.summary, highlightTerms) + '</p>';
      }
      leadEl.innerHTML = leadHtml;

      const sectionsEl = document.getElementById('roundupSections');
      const sections = r?.sections || [];
      if (!sections.length) {
        sectionsEl.innerHTML = '';
        return;
      }
      sectionsEl.innerHTML = sections.map((sec) => {
        const picks = (sec.picks || []).map((pick) => {
          const headline = pick.href
            ? '<a class="roundup-pick-headline" href="' + escapeHtml(pick.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(pick.headline) + '</a>'
            : '<span class="roundup-pick-headline">' + escapeHtml(pick.headline) + '</span>';
          const mapLink = pick.venueId
            ? '<a class="roundup-pick-link map map-venue-link" href="#" data-venue-id="' + escapeHtml(String(pick.venueId)) + '" data-venue-name="' + escapeHtml(pick.headline) + '">On map</a>'
            : '';
          const readLink = pick.href
            ? '<a class="roundup-pick-link" href="' + escapeHtml(pick.href) + '" target="_blank" rel="noopener noreferrer">Details</a>'
            : '';
          return (
            '<li class="roundup-pick">' +
              '<div class="roundup-pick-top">' +
                (pick.date ? '<span class="roundup-pick-date">' + escapeHtml(pick.date) + '</span>' : '') +
                headline +
                (pick.venue ? '<span class="roundup-pick-venue">' + escapeHtml(pick.venue) + '</span>' : '') +
              '</div>' +
              (pick.detail ? '<div class="roundup-pick-detail">' + colorizeRoundupText(pick.detail, highlightTerms) + '</div>' : '') +
              ((readLink || mapLink) ? '<div class="roundup-pick-actions">' + readLink + mapLink + '</div>' : '') +
            '</li>'
          );
        }).join('');
        const sectionSlug = (sec.id || 'default').replace(/[^a-z0-9_-]/gi, '');
        return (
          '<div class="roundup-section roundup-section--' + escapeHtml(sectionSlug) + '">' +
            '<div class="roundup-section-head">' +
              (sec.icon ? '<span class="roundup-section-icon">' + escapeHtml(sec.icon) + '</span>' : '') +
              '<h3 class="roundup-section-title">' + escapeHtml(sec.title) + '</h3>' +
            '</div>' +
            '<ul class="roundup-picks">' + picks + '</ul>' +
          '</div>'
        );
      }).join('');
    }

    function renderTabs() {
      const row = document.getElementById('tabRow');
      const tabs = FEED.tabs || [];
      row.innerHTML = tabs.map((t) =>
        '<button type="button" class="tab-btn' + (t.id === activeTab ? ' active ' + (TAB_GENRE_CLASS[t.id] || '') : '') + '" role="tab" aria-selected="' + (t.id === activeTab) + '" data-tab="' + escapeHtml(t.id) + '">' +
          '<span>' + escapeHtml(t.icon || '') + '</span> ' + escapeHtml(t.label) +
        '</button>'
      ).join('');
      row.querySelectorAll('[data-tab]').forEach((btn) => {
        btn.addEventListener('click', () => setTab(btn.getAttribute('data-tab')));
      });
      const cur = tabs.find((t) => t.id === activeTab);
      document.getElementById('tabDesc').textContent = cur?.desc || '';
    }

    function setTab(id) {
      activeTab = id;
      renderTabs();
      renderContent();
      try {
        const u = new URL(window.location.href);
        u.searchParams.set('tab', id);
        history.replaceState(null, '', u.pathname + u.search);
      } catch (_) { /* ignore */ }
    }

    function buildNewsCard(item) {
      const hasImg = Boolean(item.imageUrl);
      const media = hasImg
        ? '<div class="news-card-media"><img src="' + escapeHtml(item.imageUrl) + '" alt="" loading="lazy"></div>'
        : '<div class="news-card-media placeholder" aria-hidden="true"></div>';
      const tags = (item.tags || []).map((tg) => '<span class="tag">' + escapeHtml(tg) + '</span>').join('');
      const mapBtn = item.venueId
        ? '<a class="card-link map-link map-venue-link" href="#" data-venue-id="' + escapeHtml(String(item.venueId)) + '" data-venue-name="' + escapeHtml(item.title || '') + '">On map</a>'
        : '';
      return (
        '<article class="news-card">' +
          media +
          '<div class="news-card-body">' +
            '<div class="news-card-meta">' +
              (item.date ? '<span class="news-card-date">' + escapeHtml(item.date) + '</span>' : '') +
              (item.source ? '<span class="news-card-source">' + escapeHtml(item.source) + '</span>' : '') +
            '</div>' +
            '<h2 class="news-card-title"><a href="' + escapeHtml(item.href || '#') + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.title) + '</a></h2>' +
            (tags ? '<div class="tag-row">' + tags + '</div>' : '') +
            '<p class="news-card-snippet">' + escapeHtml(item.snippet) + '</p>' +
            '<div class="card-actions">' +
              '<a class="card-link" href="' + escapeHtml(item.href || '#') + '" target="_blank" rel="noopener noreferrer">Read more</a>' +
              mapBtn +
            '</div>' +
          '</div>' +
        '</article>'
      );
    }

    function buildSourceList() {
      const sources = FEED.sources || [];
      if (!sources.length) return '<p class="empty-msg">No sources listed.</p>';
      return '<div class="source-list">' + sources.map((s, i) =>
        '<div class="source-row">' +
          '<span class="source-num">' + String(i + 1).padStart(2, '0') + '</span>' +
          '<a href="' + escapeHtml(s.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(s.name) + '</a>' +
          '<span class="source-note">' + escapeHtml(s.note || '') + '</span>' +
        '</div>'
      ).join('') + '</div>';
    }

    function renderContent() {
      const grid = document.getElementById('newsGrid');
      if (activeTab === 'sources') {
        grid.className = '';
        grid.innerHTML = buildSourceList();
        return;
      }
      grid.className = 'news-grid';
      const items = (FEED.items || []).filter((it) => it.tab === activeTab);
      if (!items.length) {
        grid.innerHTML = '<p class="empty-msg">No snippets in this tab yet — add rows to data/music-news-feed.json</p>';
        return;
      }
      grid.innerHTML = items.map(buildNewsCard).join('');
    }

    document.addEventListener('click', (e) => {
      const a = e.target.closest('.map-venue-link');
      if (!a) return;
      e.preventDefault();
      notifyHubMapVenue(a.getAttribute('data-venue-id'), a.getAttribute('data-venue-name'));
    });

    async function boot() {
      const err = document.getElementById('errBanner');
      try {
        await loadFeed();
        err.style.display = 'none';
        const p = new URLSearchParams(window.location.search);
        const tabParam = p.get('tab');
        if (tabParam && (FEED.tabs || []).some((t) => t.id === tabParam)) activeTab = tabParam;
        renderMeta();
        renderTabs();
        renderContent();
      } catch (e) {
        err.textContent = 'Could not load music news feed. Run npm start and open via http://localhost:4000/… — ' + (e.message || e);
        err.style.display = 'block';
      }
    }

    boot();
  </script>
</body>
</html>
