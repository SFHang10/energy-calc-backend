<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zara embed expand — local Wix simulator</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
  }
  .wix-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  .wix-hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: end;
    margin-bottom: 24px;
  }
  .wix-hero img {
    width: 100%;
    max-height: 420px;
    object-fit: contain;
    object-position: bottom center;
  }
  .embed-box {
    border: 2px dashed rgba(255, 140, 26, 0.5);
    border-radius: 12px;
    padding: 8px;
    background: rgba(0, 0, 0, 0.25);
  }
  .embed-box label {
    display: block;
    font-size: 0.75rem;
    color: #ffb04d;
    margin-bottom: 6px;
  }
  #zara-embed {
    width: 100%;
    height: 480px;
    border: 0;
    border-radius: 8px;
    display: block;
    background: #0a1018;
  }
  .hint {
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 12px;
    line-height: 1.5;
  }
  @media (max-width: 720px) {
    .wix-hero { grid-template-columns: 1fr; }
  }
</style>
<script src="js/wix-greenways-embed-parent.js"></script>
</head>
<body>
<div class="wix-page">
  <h1>Zara page (simulated Wix layout)</h1>
  <p class="hint">Character beside a <strong>480px</strong> embed — same as your shrunk Wix iframe. Use <strong>⛶ Full chat</strong> inside Zara, then <strong>← Back to page</strong>.</p>
  <div class="wix-hero">
    <div>
      <img src="https://static.wixstatic.com/media/c123de_c7cdbed4a4ee407289677a4f0079c1e5~mv2.png" alt="Zara">
    </div>
    <div class="embed-box">
      <label>Wix “Embed a site” box (480px)</label>
      <iframe
        id="zara-embed"
        data-greenways-agent="deals"
        title="Zara Deals Agent"
        src="greenways-deals-agent.html?embed=1"></iframe>
    </div>
  </div>
  <p class="hint">Or test the combined frame URL: <a href="greenways-deals-agent-wix-frame.html" style="color:#ffb04d">deals-agent-wix-frame</a></p>
</div>
<script>
(function () {
  var frame = document.getElementById("zara-embed");
  if (location.protocol !== "file:" && location.port) {
    frame.src = location.origin + "/greenways/deals-agent?embed=1";
  }
})();
</script>
</body>
</html>
