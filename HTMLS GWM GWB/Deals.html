<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wix-html-scroll" content="no-scroll">
  <title>Greenways Buildings — Deals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #00f582;
      --accent-dim: rgba(0, 245, 130, 0.12);
      --accent-hot: rgba(0, 245, 130, 0.22);
      --black: #0A0A0A;
      --dark: #111111;
      --panel: #191919;
      --border: #2A2A2A;
      --text: #F0EDE8;
      --text-dim: #888880;
      --text-faint: #444440;
      --font: 'Space Grotesk', sans-serif;
      --font-clean: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      /* Page backdrop — rollback: remove class deals-shell--backdrop from <body> */
      --deals-page-backdrop-image: url("https://static.wixstatic.com/media/c123de_6d64dbcce52a466ab4146d7e83713731~mv2.jpg");
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow: hidden;
    }
    /* Photo backdrop (main dashboard style) — hidden unless body has .deals-shell--backdrop */
    .deals-page-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: var(--black);
      background-image:
        linear-gradient(rgba(5, 14, 9, 0.38), rgba(5, 14, 9, 0.44)),
        radial-gradient(circle at 22% 18%, rgba(0, 245, 130, 0.06), transparent 48%),
        var(--deals-page-backdrop-image);
      background-size: cover, cover, cover;
      background-position: center, center, center;
      background-repeat: no-repeat;
      opacity: 0.92;
      filter: brightness(0.88) saturate(1.05);
    }
    body.deals-shell--backdrop .deals-page-backdrop { display: block; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }
    header {
      position: relative;
      z-index: 10;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #0a5c36 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: var(--font);
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }
    .logo-sub {
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: var(--mono);
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-header {
      padding: 7px 14px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .btn-header:hover {
      border-color: var(--accent-hot);
      color: var(--text);
    }
    .btn-header.primary {
      background: var(--accent-dim);
      border-color: var(--accent-hot);
      color: var(--accent);
    }
    .btn-header.primary:hover {
      background: rgba(0, 245, 130, 0.2);
    }
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      min-height: 0;
    }
    body.deals-shell--backdrop header,
    body.deals-shell--backdrop aside,
    body.deals-shell--backdrop .main-toolbar {
      background: rgba(17, 17, 17, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    aside {
      background: var(--dark);
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 1.1rem 1.1rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-family: var(--font);
      margin-bottom: 0.65rem;
    }
    .sidebar-note {
      font-family: var(--font-clean);
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-dim);
    }
    .quick-actions { display: flex; flex-direction: column; gap: 6px; }
    .quick-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
    }
    a.quick-btn { color: var(--text-dim); }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(0, 245, 130, 0.06);
    }
    .quick-btn span { font-size: 1rem; flex-shrink: 0; }
    main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #000;
      position: relative;
      z-index: 2;
    }
    body.deals-shell--backdrop main {
      background: transparent;
    }
    .main-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--dark);
    }
    .main-toolbar span {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .frame-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body class="deals-shell--backdrop">
  <div class="deals-page-backdrop" aria-hidden="true"></div>
  <div class="shell">
    <header>
      <div class="logo">
        <div class="logo-icon">🏷️</div>
        <div>
          <div class="logo-text">GREENWAYS</div>
          <div class="logo-sub">Buildings · Deals</div>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="btn-header" onclick="window.location.href='./Greenways%20Interface%20.html'">← Dashboard</button>
        <button type="button" class="btn-header primary" onclick="document.getElementById('dealsFrame').contentWindow.location.reload()">Refresh hub</button>
        <a class="btn-header primary" href="./deals-ticker-hub.html" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:inline-flex;align-items:center;">Open tab</a>
      </div>
    </header>

    <div class="app">
      <aside>
        <div class="sidebar-section">
          <div class="sidebar-label">Full finders</div>
          <div class="quick-actions">
            <a class="quick-btn" href="./european_energy_deals_portal.html" target="_blank" rel="noopener noreferrer"><span>⚡</span> Energy deals portal</a>
            <a class="quick-btn" href="./water-saving-finder.html" target="_blank" rel="noopener noreferrer"><span>💧</span> Water saving finder</a>
            <a class="quick-btn" href="./sustainable_product_deal_finder_portal.html" target="_blank" rel="noopener noreferrer"><span>🌿</span> Sustainable products</a>
          </div>
        </div>
        <div class="sidebar-section" hidden>
          <div class="sidebar-label">Feed</div>
          <p class="sidebar-note">Highlights refresh when you run <strong style="color:var(--text)">npm run build:deals-feed</strong> in the repo. Search and filters run in the hub below.</p>
        </div>
      </aside>

      <main>
        <div class="main-toolbar">
          <span>Deals hub · scroll lanes + search</span>
        </div>
        <div class="frame-wrap">
          <iframe
            id="dealsFrame"
            title="Greenways deals hub — energy, water, sustainability"
            src="./deals-ticker-hub.html"
          ></iframe>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
