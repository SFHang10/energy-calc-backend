<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wix-html-scroll" content="no-scroll">
<title>Greenways Transition Agents — Agent map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/HTMLS%20GWM%20GWB/js/greenways-portal-nav.css">
<style>
  :root {
    --text: #e8f0ec;
    --muted: #8fa89a;
    --gold: #c9a961;
    --font: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background:
      linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%),
      radial-gradient(circle at 20% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(34, 197, 94, 0.08) 0%, transparent 50%);
    color: var(--text);
    font-family: var(--font);
    overflow-x: hidden;
    line-height: 1.55;
  }
  .gw-portal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: url("/product-placement/green-buildings-1600-x-1067-wallpaper-richu29freg5tc1n.jpg");
    background-size: auto;
    background-position: top left;
    background-repeat: repeat;
    opacity: 0.45;
  }
  .gw-portal-grain {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(34,197,94,0.03)"/><circle cx="75" cy="75" r="1" fill="rgba(34,197,94,0.03)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
  }
  .gw-portal-scrim {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 20%, rgba(34, 197, 94, 0.1), transparent 65%);
  }
  .map-page {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 16px 44px;
  }
  .map-hero {
    text-align: center;
    margin-bottom: 24px;
  }
  .map-hero h1 {
    font-size: clamp(1.45rem, 3.5vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .map-hero p {
    max-width: 640px;
    margin: 12px auto 0;
    font-size: 0.92rem;
    color: #fff;
  }
  .map-hero p strong { font-weight: 600; }
  .agent-map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 220px), 1fr));
    gap: 14px;
  }
  .agent-map-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 16px 14px 14px;
    border-radius: 14px;
    border: 1px solid rgba(134, 239, 172, 0.28);
    background: linear-gradient(160deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.78));
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .agent-map-card:hover {
    transform: translateY(-2px);
    border-color: rgba(134, 239, 172, 0.5);
    box-shadow: 0 16px 32px rgba(0, 0, 0, 0.28);
  }
  .agent-map-card img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top center;
    border: 2px solid rgba(75, 140, 104, 0.45);
    margin-bottom: 10px;
  }
  .agent-map-card .name {
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
  }
  .agent-map-card .lane {
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.35;
  }
  .agent-map-card .open {
    margin-top: 10px;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(134, 239, 172, 0.4);
    background: rgba(40, 167, 69, 0.14);
    color: #86efac;
  }
  .map-footer {
    margin-top: 28px;
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .map-footer a {
    color: #a5f3fc;
    font-weight: 600;
    text-decoration: none;
  }
  .map-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="gw-portal-backdrop" aria-hidden="true"></div>
<div class="gw-portal-grain" aria-hidden="true"></div>
<div class="gw-portal-scrim" aria-hidden="true"></div>
<div class="map-page">
  <nav class="gw-portal-nav" aria-label="Greenways Transition Agents Portal">
    <a href="/greenways/agents-story">Why this portal</a>
    <a href="/greenways/agents-highlights">Portal highlights</a>
    <a href="/greenways/orchestra-hub-wix-frame" class="is-muted">Orchestra hub</a>
    <a href="/greenways/agents-map" class="is-current" aria-current="page">Agent map</a>
  </nav>

  <header class="map-hero">
    <h1>Meet the Transition Agents</h1>
    <p>
      Seven specialists — each with their own chat room. Tap a portrait to open their page, or use the
      <strong>Orchestra hub</strong> if you are not sure who to ask first.
    </p>
  </header>

  <div class="agent-map-grid" id="agent-map-grid" aria-label="Greenways agent team"></div>

  <p class="map-footer">
    New here? Read <a href="/greenways/agents-story">why this portal exists</a> ·
    <a href="/greenways/orchestra-hub-wix-frame">Open Orchestra hub →</a>
  </p>
</div>
<script>
(function () {
  function contentBase() {
    var h = location.hostname || "";
    if (h === "localhost" || h === "127.0.0.1" || h.indexOf("energy-calc-backend") !== -1) {
      return location.origin || "";
    }
    return "https://energy-calc-backend.onrender.com";
  }

  var ROLE_LINES = {
    grants: "Grants & schemes",
    finance: "Finance & payback",
    equipment: "Equipment & renovation",
    deals: "Deals & tariffs",
    media: "News & media",
    products: "Sustainable products",
    systems: "Systems & monitoring"
  };

  var ROSTER_FALLBACK = [
    { id: "grants", name: "Andrieus", slug: "grants-agent", path: "/greenways/grants-agent", imageUrl: "https://static.wixstatic.com/media/c123de_46943b6b1f8d41a59960fd8fdde4097b~mv2.png" },
    { id: "finance", name: "Vincent", slug: "finance-agent", path: "/greenways/finance-agent", imageUrl: "https://static.wixstatic.com/media/c123de_63359ab891354966aa9ff792fe998677~mv2.png" },
    { id: "equipment", name: "Artemis", slug: "equipment-agent", path: "/greenways/equipment-agent", imageUrl: "https://static.wixstatic.com/media/c123de_126830b1fc224df880dfa37ec830620e~mv2.png" },
    { id: "deals", name: "Zara", slug: "deals-agent", path: "/greenways/deals-agent", imageUrl: "https://static.wixstatic.com/media/c123de_c7cdbed4a4ee407289677a4f0079c1e5~mv2.png" },
    { id: "media", name: "Cheryce", slug: "media-agent", path: "/greenways/media-agent", imageUrl: "https://static.wixstatic.com/media/c123de_333c90ab8930465a98b503e1d24316b4~mv2.png" },
    { id: "products", name: "Zyanne", slug: "sustainable-products-agent", path: "/greenways/sustainable-products-agent", imageUrl: "https://static.wixstatic.com/media/c123de_dc5b2e3e4aef4cc4b75c7b44888281bd~mv2.png" },
    { id: "systems", name: "Edwardo", slug: "systems-agent", path: "/greenways/systems-agent", imageUrl: "https://static.wixstatic.com/media/c123de_eeb61cbf84bd402eb642e28b2b457c76~mv2.png" }
  ];

  function renderGrid(agents) {
    var mount = document.getElementById("agent-map-grid");
    if (!mount) return;
    mount.innerHTML = (agents || []).map(function (a) {
      var role = ROLE_LINES[a.id] || a.shortLabel || a.role || "";
      var href = contentBase() + (a.path || "/greenways/" + a.slug);
      return (
        '<a class="agent-map-card" href="' + href + '" target="_top" rel="noopener">' +
        '<img src="' + a.imageUrl + '" alt="" width="72" height="72" decoding="async">' +
        '<span class="name">' + a.name + "</span>" +
        '<span class="lane">' + role + "</span>" +
        '<span class="open">Open chat</span></a>'
      );
    }).join("");
  }

  renderGrid(ROSTER_FALLBACK);
  fetch(contentBase() + "/data/greenways-agent-roster.json")
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.agents && data.agents.length) renderGrid(data.agents);
    })
    .catch(function () {});
})();
</script>
</body>
</html>
