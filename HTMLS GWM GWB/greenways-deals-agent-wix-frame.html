<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wix-html-scroll" content="no-scroll">
<title>Zara — Deals Agent (Wix frame)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #080c14;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .zara-shell {
    display: grid;
    grid-template-columns: minmax(140px, 38%) 1fr;
    height: 100%;
    min-height: 420px;
    gap: 0;
    transition: grid-template-columns 0.25s ease;
  }
  .zara-shell.is-expanded {
    grid-template-columns: 0 1fr;
  }
  .zara-character {
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 30% 20%, rgba(255, 140, 26, 0.12), transparent 55%), #0a1018;
    border-right: 1px solid rgba(255, 140, 26, 0.2);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    transition: opacity 0.2s ease, border-color 0.2s ease;
  }
  .zara-shell.is-expanded .zara-character {
    opacity: 0;
    pointer-events: none;
    border-color: transparent;
  }
  .zara-character img {
    width: 100%;
    max-height: 100%;
    object-fit: contain;
    object-position: bottom center;
    display: block;
  }
  .zara-iframe-wrap {
    min-width: 0;
    min-height: 0;
    height: 100%;
    background: #0a1018;
  }
  .zara-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  @media (max-width: 560px) {
    .zara-shell:not(.is-expanded) {
      grid-template-columns: 1fr;
      grid-template-rows: 120px 1fr;
    }
    .zara-shell:not(.is-expanded) .zara-character {
      border-right: none;
      border-bottom: 1px solid rgba(255, 140, 26, 0.2);
    }
    .zara-character img {
      object-fit: cover;
      object-position: center 15%;
    }
  }
</style>
</head>
<body>
<div class="zara-shell" id="zara-shell">
  <div class="zara-character" id="zara-character" aria-hidden="true">
    <img
      src="https://static.wixstatic.com/media/c123de_c7cdbed4a4ee407289677a4f0079c1e5~mv2.png"
      alt=""
      width="400"
      height="520"
      decoding="async">
  </div>
  <div class="zara-iframe-wrap">
    <iframe
      id="zara-agent-frame"
      title="Zara — Deals Agent chat"
      src="about:blank"
      allow="clipboard-write"
      loading="eager"></iframe>
  </div>
</div>
<script>
(function () {
  var shell = document.getElementById("zara-shell");
  var frame = document.getElementById("zara-agent-frame");
  var origin = location.origin;
  var agentPath = "/greenways/deals-agent?embed=1";
  if (location.protocol === "file:") {
    frame.src = "greenways-deals-agent.html?embed=1";
  } else {
    frame.src = origin + agentPath;
  }

  window.addEventListener("message", function (e) {
    var d = e && e.data;
    if (!d || d.type !== "greenways-agent-expand") return;
    if (d.agent && d.agent !== "deals") return;

    var expanded = !!d.expanded;
    shell.classList.toggle("is-expanded", expanded);

    try {
      window.parent.postMessage(
        { type: "greenways-wix-frame-expand", agent: "deals", expanded: expanded },
        "*"
      );
    } catch (_) {}

    try {
      if (e.source && e.source.postMessage) {
        e.source.postMessage(
          { type: "greenways-agent-expand-ack", agent: "deals", expanded: expanded },
          "*"
        );
      }
    } catch (_) {}
  });
})();
</script>
</body>
</html>
