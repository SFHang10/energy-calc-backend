<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wix-html-scroll" content="no-scroll">
  <title>Music Inquiries Admin</title>
  <style>
    body {
      margin: 0;
      background: #0f1013;
      color: #e7e7ea;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 6px; color: #f0a03a; font-size: 1.5rem; }
    .sub { color: #9ca0aa; margin-bottom: 14px; font-size: 0.9rem; }
    .bar { display: flex; gap: 8px; margin-bottom: 12px; }
    button {
      border: 1px solid #3f4654;
      background: #1c2029;
      color: #e7e7ea;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: #f0a03a; color: #f0a03a; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #161a22;
      border: 1px solid #272d3a;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid #252a36;
      padding: 10px;
      vertical-align: top;
      font-size: 0.82rem;
    }
    th { color: #f0a03a; background: #11151d; }
    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      background: #2a2f3c;
    }
    .status.new { background: #3f2f16; color: #ffd08c; }
    .status.contacted { background: #173223; color: #96e5b9; }
    .status.closed { background: #2f2f31; color: #c8cad0; }
    .message { white-space: pre-wrap; max-width: 360px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Music Inquiries Admin</h1>
    <div class="sub">Review and update contact requests from artists.</div>
    <div class="bar">
      <button id="refresh-btn">Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Venue ID</th>
          <th>Artist</th>
          <th>Contact</th>
          <th>Message</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    async function loadInquiries() {
      const rows = document.getElementById('rows');
      rows.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';
      try {
        const res = await fetch('/api/music-venue-inquiries');
        const data = await res.json();
        const items = data.items || [];
        if (!items.length) {
          rows.innerHTML = '<tr><td colspan="7">No inquiries yet.</td></tr>';
          return;
        }
        rows.innerHTML = items.slice().reverse().map((item) => `
          <tr>
            <td>${item.venueId}</td>
            <td>
              <strong>${escapeHtml(item.name || '')}</strong><br>
              <span>${escapeHtml(item.instrument || '-')}</span>
            </td>
            <td>
              <a href="mailto:${escapeHtml(item.email || '')}">${escapeHtml(item.email || '')}</a><br>
              <span>${escapeHtml(item.preferredDate || '-')}</span>
            </td>
            <td class="message">${escapeHtml(item.message || '')}</td>
            <td><span class="status ${escapeHtml(item.status || 'new')}">${escapeHtml(item.status || 'new')}</span></td>
            <td>${new Date(item.createdAt).toLocaleString()}</td>
            <td>
              <button onclick="setStatus(${item.id}, 'contacted')">Contacted</button>
              <button onclick="setStatus(${item.id}, 'closed')">Closed</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        rows.innerHTML = '<tr><td colspan="7">Failed to load inquiries.</td></tr>';
      }
    }

    async function setStatus(id, status) {
      try {
        const res = await fetch(`/api/music-venue-inquiries/${id}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (res.ok) loadInquiries();
      } catch (_) {}
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    document.getElementById('refresh-btn').addEventListener('click', loadInquiries);
    loadInquiries();
  </script>
</body>
</html>
