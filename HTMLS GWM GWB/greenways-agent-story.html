<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wix-html-scroll" content="no-scroll">
  <title>Greenways — Agent story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/HTMLS%20GWM%20GWB/js/greenways-portal-nav.css">
  <style>
    :root {
      --bg: #060a10;
      --panel: rgba(8, 14, 12, 0.72);
      --border: rgba(0, 245, 130, 0.28);
      --text: #e8f0ec;
      --muted: #8fa89a;
      --green: #3dcf7a;
      --neon: #b8f5d4;
      --gold: #c9a961;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --font-clean: 'IBM Plex Sans', system-ui, sans-serif;
      --theme: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }
    .gw-portal-backdrop {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("/product-placement/green-buildings-1600-x-1067-wallpaper-richu29freg5tc1n.jpg");
      background-size: cover; background-position: center; opacity: 0.35;
    }
    .gw-portal-scrim {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 30% 10%, rgba(0, 245, 130, 0.12), transparent 55%),
        linear-gradient(180deg, rgba(6, 10, 16, 0.55), rgba(6, 10, 16, 0.88));
    }
    .page {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 20px 16px 72px;
    }
    .glass {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative; overflow: hidden;
    }
    .glass::after {
      content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 232, 122, 0.018) 2px, rgba(0, 232, 122, 0.018) 4px);
    }
    .glass > * { position: relative; z-index: 1; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 18px;
      padding: 20px;
      margin-bottom: 18px;
    }
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
    }
    .hero-brand {
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: #6a8f7a; font-weight: 600; margin-bottom: 8px;
    }
    .hero-row {
      display: flex; gap: 14px; align-items: flex-start;
    }
    .hero-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      border: 2px solid var(--theme);
      box-shadow: 0 0 0 3px rgba(0, 245, 130, 0.15), 0 8px 24px rgba(0, 0, 0, 0.4);
      object-fit: cover; flex-shrink: 0;
    }
    .hero h1 {
      font-size: clamp(1.6rem, 3vw, 2.1rem);
      color: var(--neon);
      letter-spacing: -0.02em;
      text-shadow: 0 0 18px rgba(0, 245, 130, 0.18);
    }
    .role-line { margin-top: 4px; color: var(--gold); font-size: 0.95rem; font-weight: 600; }
    .story-lede {
      margin-top: 12px; color: #cfe8d9; font-size: 0.95rem; line-height: 1.55;
      font-family: var(--font-clean);
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 14px; border-radius: 999px; font: 600 0.82rem var(--font);
      text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
      background: rgba(0, 245, 130, 0.2); cursor: pointer;
    }
    .btn:hover { background: rgba(0, 245, 130, 0.32); }
    .btn.ghost { background: rgba(15, 23, 42, 0.45); border-color: rgba(148, 163, 184, 0.35); }

    .video-slot {
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px dashed rgba(0, 245, 130, 0.35);
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.55), rgba(15, 40, 28, 0.65)),
        center / cover no-repeat;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 16px; min-height: 180px;
      position: relative; overflow: hidden;
    }
    .video-slot.has-video { border-style: solid; padding: 0; }
    .video-slot iframe, .video-slot video {
      width: 100%; height: 100%; border: 0; display: block; border-radius: 12px;
    }
    .video-placeholder-copy {
      max-width: 16rem; font-size: 0.82rem; line-height: 1.45; color: #dbeafe;
    }
    .video-placeholder-copy strong { display: block; margin-bottom: 6px; color: #fff; font-size: 0.9rem; }

    .section {
      padding: 18px 20px; margin-bottom: 16px;
    }
    .section h2 {
      font-size: 1.05rem; color: var(--neon); margin-bottom: 10px; letter-spacing: -0.01em;
    }
    .section-label {
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #6a8f7a; font-weight: 600; margin-bottom: 6px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      font-size: 0.75rem; padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(0, 245, 130, 0.28); background: rgba(0, 245, 130, 0.08);
      color: #bbf7d0;
    }

    .journey {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .journey:first-of-type { margin-top: 4px; padding-top: 0; border-top: none; }
    .journey-q {
      font-size: 0.98rem; font-weight: 600; color: #fff; margin-bottom: 12px;
      line-height: 1.4;
    }
    .journey-q span {
      display: inline-block; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 4px;
    }
    .journey-steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      align-items: stretch;
      position: relative;
    }
    @media (max-width: 720px) {
      .journey-steps { grid-template-columns: 1fr; gap: 10px; }
      .journey-steps::before { display: none; }
      .step-connector { display: none; }
    }
    .journey-steps::before {
      content: '';
      position: absolute;
      top: 22px; left: 12%; right: 12%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--theme), var(--theme), transparent);
      opacity: 0.55;
      animation: journeyPulse 2.8s ease-in-out infinite;
    }
    @keyframes journeyPulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.75; }
    }
    @media (prefers-reduced-motion: reduce) {
      .journey-steps::before { animation: none; opacity: 0.5; }
    }
    .step {
      text-align: center; padding: 0 8px; position: relative; z-index: 1;
    }
    .step-num {
      width: 44px; height: 44px; margin: 0 auto 10px;
      border-radius: 50%;
      border: 2px solid var(--theme);
      background: #04110a;
      color: var(--neon);
      font-weight: 700; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(0, 245, 130, 0.25);
    }
    .step-label { font-size: 0.82rem; font-weight: 700; color: #ecfdf5; margin-bottom: 4px; }
    .step-detail { font-size: 0.72rem; line-height: 1.4; color: var(--muted); font-family: var(--font-clean); }
    .journey-cta { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }

    .demo-grid {
      display: grid; grid-template-columns: 1fr; gap: 14px;
    }
    .demo-card { overflow: hidden; }
    .demo-caption {
      padding: 10px 12px; font-size: 0.78rem; color: #cfe8d9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-family: var(--font-clean);
    }
    .demo-frame-wrap {
      height: min(420px, 58vh);
      background: #000;
    }
    .demo-frame-wrap iframe {
      width: 100%; height: 100%; border: 0; display: block;
    }
    .demo-actions { padding: 10px 12px; display: flex; gap: 8px; flex-wrap: wrap; }

    .tips { list-style: none; }
    .tips li {
      padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.86rem; line-height: 1.45; color: #d1fae5;
      font-family: var(--font-clean);
    }
    .tips li:last-child { border-bottom: none; }
    .out-of-scope {
      margin-top: 10px; font-size: 0.78rem; color: #94a3b8; line-height: 1.45;
      font-family: var(--font-clean);
    }

    .proof { display: flex; flex-wrap: wrap; gap: 8px; }
    .proof span {
      font-size: 0.72rem; padding: 7px 10px; border-radius: 10px;
      background: rgba(15, 23, 42, 0.55); border: 1px solid rgba(148, 163, 184, 0.25);
      color: #cbd5e1;
    }

    .handoff-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .handoff-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.4);
      text-decoration: none; color: inherit; min-width: 200px; flex: 1 1 200px;
    }
    .handoff-card:hover { border-color: var(--theme); }
    .handoff-card img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .handoff-card strong { display: block; font-size: 0.85rem; }
    .handoff-card small { color: var(--muted); font-size: 0.72rem; }

    .starters { display: flex; flex-wrap: wrap; gap: 8px; }
    .starter {
      font: 600 0.78rem var(--font); padding: 8px 12px; border-radius: 999px;
      border: 1px solid rgba(201, 169, 97, 0.4); background: rgba(201, 169, 97, 0.12);
      color: #fde68a; text-decoration: none; cursor: pointer;
    }
    .starter:hover { background: rgba(201, 169, 97, 0.22); }

    .error-box {
      padding: 24px; text-align: center; color: #fecaca;
    }
    .loading { padding: 40px; text-align: center; color: var(--muted); }

    body.theme-grants { --theme: #60a5fa; }
    body.theme-finance { --theme: #c9a961; }
    body.theme-equipment { --theme: #4ade80; }
    body.theme-deals { --theme: #fb923c; }
    body.theme-media { --theme: #c084fc; }
    body.theme-products { --theme: #2dd4bf; }
    body.theme-systems { --theme: #fbbf24; }
  </style>
</head>
<body>
  <div class="gw-portal-backdrop" aria-hidden="true"></div>
  <div class="gw-portal-scrim" aria-hidden="true"></div>
  <div class="page">
    <nav class="gw-portal-nav" aria-label="Greenways Transition Agents Portal">
      <a href="/greenways/customer-hub">Your Hub</a>
      <a href="/greenways/agents-story">Why this portal</a>
      <a href="/greenways/agents-highlights">Portal highlights</a>
      <a href="/greenways/orchestra-hub-wix-frame" class="is-muted">Orchestra hub</a>
      <a href="/greenways/agents-map" class="is-muted">Agent map</a>
    </nav>

    <div id="story-root" class="loading">Loading agent story…</div>
  </div>

  <script>
(function () {
  var MODULE_HREF_FALLBACK = {
    "schemes-portal-restaurant": "/HTMLS%20GWM%20GWB/Full%20Schemes%20Portal%20Restaurant.html",
    "schemes-portal-eu": "/HTMLS%20GWM%20GWB/Full%20Schemes%20Portal%20html.html",
    "energy-prices-ticker": "/content-ops/drafts/energy-ticker/energy-ticker-green-wire.html",
    "savings-projection": "/HTMLS%20GWM%20GWB/equipment-savings-projection.html",
    "finance-finder": "/HTMLS%20GWM%20GWB/finance-finder-restaurant.html",
    "savings-trajectory": "/HTMLS%20GWM%20GWB/energy-savings-trajectory.html",
    "equipment-deep-dive": "/HTMLS%20GWM%20GWB/restaurant-equipment-deep-dive.html",
    "insulation-guide": "/HTMLS%20GWM%20GWB/insulation_energy_savings_infographic.html",
    "deals-ticker": "/greenways/deals-hub",
    "deals-full-page": "/HTMLS%20GWM%20GWB/Deals.html",
    "european-energy": "/HTMLS%20GWM%20GWB/european_energy_deals_portal.html",
    "sustainability-map": "/HTMLS%20GWM%20GWB/European%20Company%20-%20Case%20Study%20Finder%20(Standalone)%20-%20Wix%20bundle.html",
    "sustainability-news-edition": "/content-ops/review/sustainability-news/2026-06-sustainability-news.html",
    "water-saving-finder": "/greenways/water-saving-finder",
    "water-saving-guide": "/HTMLS%20GWM%20GWB/Water-Saving-Guide%20updated.html",
    "sustainable-product-finder": "/HTMLS%20GWM%20GWB/sustainable_product_deal_finder_portal.html",
    "sensor-dashboard": "/greenways/sensor-dashboard",
    "greenways-dashboard": "/greenways/buildings-dashboard",
    "restaurant-iot": "/HTMLS%20GWM%20GWB/smart_restaurant_energy_iot_v2.svg"
  };

  var ROSTER_FALLBACK = [
    { id: "grants", name: "Andrieus", slug: "grants-agent", path: "/greenways/grants-agent", imageUrl: "https://static.wixstatic.com/media/c123de_46943b6b1f8d41a59960fd8fdde4097b~mv2.png" },
    { id: "finance", name: "Vincent", slug: "finance-agent", path: "/greenways/finance-agent", imageUrl: "https://static.wixstatic.com/media/c123de_63359ab891354966aa9ff792fe998677~mv2.png" },
    { id: "equipment", name: "Artemis", slug: "equipment-agent", path: "/greenways/equipment-agent", imageUrl: "https://static.wixstatic.com/media/c123de_126830b1fc224df880dfa37ec830620e~mv2.png" },
    { id: "deals", name: "Zara", slug: "deals-agent", path: "/greenways/deals-agent", imageUrl: "https://static.wixstatic.com/media/c123de_c7cdbed4a4ee407289677a4f0079c1e5~mv2.png" },
    { id: "media", name: "Cheryce", slug: "media-agent", path: "/greenways/media-agent", imageUrl: "https://static.wixstatic.com/media/c123de_333c90ab8930465a98b503e1d24316b4~mv2.png" },
    { id: "products", name: "Zyanne", slug: "sustainable-products-agent", path: "/greenways/sustainable-products-agent", imageUrl: "https://static.wixstatic.com/media/c123de_dc5b2e3e4aef4cc4b75c7b44888281bd~mv2.png" },
    { id: "systems", name: "Edwardo", slug: "systems-agent", path: "/greenways/systems-agent", imageUrl: "https://static.wixstatic.com/media/c123de_eeb61cbf84bd402eb642e28b2b457c76~mv2.png" }
  ];

  function contentBase() {
    var h = location.hostname || "";
    if (h === "localhost" || h === "127.0.0.1" || h.indexOf("energy-calc-backend") !== -1) {
      return location.origin || "";
    }
    return "https://energy-calc-backend.onrender.com";
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function parseSlug() {
    var path = location.pathname || "";
    var m = path.match(/\/greenways\/agents\/([a-z0-9-]+)\/story\/?$/i);
    if (m) return m[1].toLowerCase();
    var q = new URLSearchParams(location.search || "");
    var fromQ = (q.get("agent") || q.get("slug") || "").toLowerCase();
    if (fromQ) return fromQ;
    return "grants-agent";
  }

  function resolveModuleHref(moduleId, modulesById) {
    // Prefer curated absolute paths for story embeds (avoid registry ./ + double-encoding).
    if (MODULE_HREF_FALLBACK[moduleId]) {
      return contentBase() + MODULE_HREF_FALLBACK[moduleId];
    }
    var mod = modulesById && modulesById[moduleId];
    var href = (mod && (mod.href || mod.fullPageHref)) || "";
    if (!href) return "";
    if (/^https?:\/\//i.test(href)) return href;
    if (href.charAt(0) === "/") return contentBase() + href;
    var rel = href.indexOf("./") === 0 ? href.slice(2) : href;
    // Registry paths are often already percent-encoded — do not encodeURI again (%20 → %2520).
    if (rel.indexOf("%") === -1) rel = encodeURI(rel);
    return contentBase() + "/HTMLS%20GWM%20GWB/" + rel;
  }

  function embedHref(href) {
    if (!href) return href;
    var hash = "";
    var hashIdx = href.indexOf("#");
    if (hashIdx >= 0) {
      hash = href.slice(hashIdx);
      href = href.slice(0, hashIdx);
    }
    var sep = href.indexOf("?") >= 0 ? "&" : "?";
    return href + sep + "embed=1&popup=1" + hash;
  }

  function askHref(story, prompt) {
    var base = contentBase() + (story.chatPath || "/greenways/" + story.slug);
    if (!prompt) return base;
    return base + "?q=" + encodeURIComponent(prompt);
  }

  function storyPath(slug) {
    return contentBase() + "/greenways/agents/" + slug + "/story";
  }

  function renderVideo(story) {
    var url = String(story.videoUrl || "").trim();
    var poster = story.videoPoster || story.imageUrl || "";
    if (url) {
      var isYt = /youtube\.com|youtu\.be/i.test(url);
      if (isYt) {
        var idMatch = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
        var embed = idMatch
          ? "https://www.youtube.com/embed/" + idMatch[1]
          : url;
        return (
          '<div class="video-slot has-video">' +
          '<iframe src="' + escapeHtml(embed) + '" title="' + escapeHtml(story.name) + ' intro" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>' +
          "</div>"
        );
      }
      return (
        '<div class="video-slot has-video">' +
        '<video controls playsinline poster="' + escapeHtml(poster) + '" src="' + escapeHtml(url) + '"></video>' +
        "</div>"
      );
    }
    return (
      '<div class="video-slot" style="background-image:url(\'' + escapeHtml(poster) + '\')">' +
      '<div class="video-placeholder-copy">' +
      "<strong>Video intro reserved</strong>" +
      escapeHtml(story.videoPlaceholder || "Intro video coming soon.") +
      "</div></div>"
    );
  }

  function renderJourneys(story) {
    var journeys = story.journeys || [];
    if (!journeys.length) return "";
    return journeys.map(function (j) {
      var steps = (j.steps || []).slice(0, 3);
      while (steps.length < 3) steps.push({ label: "…", detail: "" });
      var stepsHtml = steps.map(function (s, i) {
        return (
          '<div class="step">' +
          '<div class="step-num">' + (i + 1) + "</div>" +
          '<div class="step-label">' + escapeHtml(s.label || "") + "</div>" +
          '<div class="step-detail">' + escapeHtml(s.detail || "") + "</div>" +
          "</div>"
        );
      }).join("");
      var ctas = "";
      if (j.askPrompt) {
        ctas += '<a class="btn" href="' + escapeHtml(askHref(story, j.askPrompt)) + '">Ask ' + escapeHtml(story.name) + "</a>";
      }
      if (j.moduleId && MODULE_HREF_FALLBACK[j.moduleId]) {
        ctas +=
          '<a class="btn ghost" href="' +
          escapeHtml(resolveModuleHref(j.moduleId)) +
          '" target="_blank" rel="noopener">Open related tool</a>';
      }
      return (
        '<article class="journey">' +
        '<p class="journey-q"><span>Example question</span><br>' + escapeHtml(j.exampleQuestion || "") + "</p>" +
        '<div class="journey-steps" aria-label="How I can help — three steps">' + stepsHtml + "</div>" +
        (ctas ? '<div class="journey-cta">' + ctas + "</div>" : "") +
        "</article>"
      );
    }).join("");
  }

  function renderDemos(story, modulesById) {
    var items = story.illustrations || [];
    if (!items.length) return "";
    return (
      '<section class="glass section">' +
      '<p class="section-label">See it in action</p>' +
      "<h2>Tools I use when helping you</h2>" +
      '<div class="demo-grid">' +
      items.map(function (item) {
        var href = resolveModuleHref(item.moduleId, modulesById);
        var src = embedHref(href);
        var title = (modulesById[item.moduleId] && modulesById[item.moduleId].title) || item.moduleId;
        return (
          '<div class="demo-card glass">' +
          '<p class="demo-caption"><strong>' + escapeHtml(title) + "</strong> — " + escapeHtml(item.caption || "") + "</p>" +
          (src
            ? '<div class="demo-frame-wrap"><iframe src="' + escapeHtml(src) + '" title="' + escapeHtml(title) + '" loading="lazy"></iframe></div>'
            : "") +
          '<div class="demo-actions">' +
          (href
            ? '<a class="btn ghost" href="' + escapeHtml(href) + '" target="_blank" rel="noopener">Open full page</a>'
            : "") +
          "</div></div>"
        );
      }).join("") +
      "</div></section>"
    );
  }

  function renderHandoffs(story, roster) {
    var rows = story.handoffs || [];
    if (!rows.length) return "";
    var bySlug = {};
    (roster || []).forEach(function (a) { bySlug[a.slug] = a; });
    return (
      '<section class="glass section">' +
      '<p class="section-label">I often work with</p>' +
      "<h2>Team handoffs</h2>" +
      '<div class="handoff-row">' +
      rows.map(function (h) {
        var peer = bySlug[h.slug] || ROSTER_FALLBACK.find(function (a) { return a.slug === h.slug; });
        if (!peer) return "";
        return (
          '<a class="handoff-card" href="' + escapeHtml(storyPath(peer.slug)) + '">' +
          '<img src="' + escapeHtml(peer.imageUrl) + '" alt="">' +
          "<div><strong>" + escapeHtml(peer.name) + "</strong>" +
          "<small>" + escapeHtml(h.reason || peer.shortLabel || "") + " · Their story</small></div></a>"
        );
      }).join("") +
      "</div></section>"
    );
  }

  function renderStory(story, roster, modulesById) {
    document.title = "Greenways — " + (story.name || "Agent") + " story";
    document.body.className = "theme-" + (story.theme || story.id || "grants");

    var chips = (story.bestFor || []).map(function (c) {
      return '<span class="chip">' + escapeHtml(c) + "</span>";
    }).join("");

    var tips = (story.tips || []).map(function (t) {
      return "<li>" + escapeHtml(t) + "</li>";
    }).join("");

    var proof = (story.proof || []).map(function (p) {
      return "<span>" + escapeHtml(p) + "</span>";
    }).join("");

    var starters = (story.starterPrompts || []).map(function (p) {
      return '<a class="starter" href="' + escapeHtml(askHref(story, p)) + '">' + escapeHtml(p) + "</a>";
    }).join("");

    return (
      '<header class="glass hero">' +
      "<div>" +
      '<p class="hero-brand">Greenways Transition Agent</p>' +
      '<div class="hero-row">' +
      '<img class="hero-avatar" src="' + escapeHtml(story.imageUrl) + '" alt="">' +
      "<div>" +
      "<h1>" + escapeHtml(story.name) + "</h1>" +
      '<p class="role-line">' + escapeHtml(story.roleLine || "") + "</p>" +
      "</div></div>" +
      '<p class="story-lede">' + escapeHtml(story.story || "") + "</p>" +
      '<div class="hero-actions">' +
      '<a class="btn" href="' + escapeHtml(askHref(story)) + '">Ask ' + escapeHtml(story.name) + "</a>" +
      '<a class="btn ghost" href="' + contentBase() + '/greenways/agents-map">All agents</a>' +
      "</div></div>" +
      renderVideo(story) +
      "</header>" +

      (chips
        ? '<section class="glass section"><p class="section-label">Best for you if…</p><div class="chips">' + chips + "</div></section>"
        : "") +

      '<section class="glass section">' +
      '<p class="section-label">How I can help</p>' +
      "<h2>Example questions → three steps</h2>" +
      renderJourneys(story) +
      "</section>" +

      renderDemos(story, modulesById) +

      (tips
        ? '<section class="glass section"><p class="section-label">Tips &amp; guidance</p><h2>How to get the best from me</h2><ul class="tips">' +
          tips +
          "</ul>" +
          (story.outOfScope
            ? '<p class="out-of-scope"><strong>What I don’t do:</strong> ' + escapeHtml(story.outOfScope) + "</p>"
            : "") +
          "</section>"
        : "") +

      (proof
        ? '<section class="glass section"><p class="section-label">Proof points</p><div class="proof">' + proof + "</div></section>"
        : "") +

      renderHandoffs(story, roster) +

      '<section class="glass section">' +
      '<p class="section-label">Try me now</p>' +
      "<h2>Starter questions</h2>" +
      '<div class="starters">' + starters + "</div>" +
      '<div class="hero-actions" style="margin-top:14px">' +
      '<a class="btn" href="' + escapeHtml(askHref(story)) + '">Open chat with ' + escapeHtml(story.name) + "</a>" +
      "</div></section>"
    );
  }

  function loadModules() {
    return fetch(contentBase() + "/data/greenways-content-modules.json")
      .then(function (r) { return r.ok ? r.json() : { modules: [] }; })
      .catch(function () { return { modules: [] }; })
      .then(function (data) {
        var map = {};
        (data.modules || []).forEach(function (m) {
          if (m && m.id) map[m.id] = m;
        });
        return map;
      });
  }

  function loadRoster() {
    return fetch(contentBase() + "/data/greenways-agent-roster.json")
      .then(function (r) { return r.ok ? r.json() : { agents: ROSTER_FALLBACK }; })
      .catch(function () { return { agents: ROSTER_FALLBACK }; })
      .then(function (data) { return data.agents || ROSTER_FALLBACK; });
  }

  function boot() {
    var root = document.getElementById("story-root");
    var slug = parseSlug();
    Promise.all([
      fetch(contentBase() + "/data/greenways-agent-stories/" + encodeURIComponent(slug) + ".json").then(function (r) {
        if (!r.ok) throw new Error("Story not found for " + slug);
        return r.json();
      }),
      loadRoster(),
      loadModules()
    ])
      .then(function (parts) {
        root.className = "";
        root.innerHTML = renderStory(parts[0], parts[1], parts[2]);
      })
      .catch(function (err) {
        root.className = "glass error-box";
        root.innerHTML =
          "<h2>Story coming soon</h2>" +
          "<p>" + escapeHtml(err.message || "Could not load this agent story.") + "</p>" +
          '<p style="margin-top:12px"><a class="btn" href="' + contentBase() + '/greenways/agents/grants-agent/story">Open Andrieus story</a> ' +
          '<a class="btn ghost" href="' + contentBase() + '/greenways/agents-map">Agent map</a></p>';
      });
  }

  boot();
})();
  </script>
</body>
</html>
